name: Build and Deploy (simple-storage-sync)

on:
  push:
    branches: [master]
    paths:
      - 'simple-storage-sync/**'
      - '.github/workflows/publish-simple-storage-sync.yml'
  pull_request:
    branches: [master]
    paths:
      - 'simple-storage-sync/**'
      - '.github/workflows/publish-simple-storage-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    uses: ./.github/workflows/_publish-extension.yml
    with:
      name: simple-storage-sync
    secrets:
      # Edge secrets disabled — see _publish-extension.yml.
      # EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID_SIMPLE_STORAGE_SYNC }}
      # EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      # EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      CHROME_PRODUCT_ID: ${{ secrets.CHROME_PRODUCT_ID_SIMPLE_STORAGE_SYNC }}
      CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      FIREFOX_API_KEY: ${{ secrets.FIREFOX_API_KEY }}
      FIREFOX_API_SECRET: ${{ secrets.FIREFOX_API_SECRET }}
